\xE9s del top set bajando el peso (t\xEDpicamente entre 10 % y 20 % menos) para acumular volumen de calidad con menos fatiga y mejor t\xE9cnica.",ej:"Top set 100 kg \u2192 back-offs 2 \xD7 8\u201310 con 85 kg (\u221215 %). FORJA te sugiere el peso autom\xE1ticamente."},{id:"dropset",term:"Drop set",def:"Al terminar la serie cerca del fallo, bajas el peso de inmediato (20\u201330 % menos) y sigues repitiendo sin descanso. Puede tener una o varias \xABca\xEDdas\xBB. Genera mucho est\xEDmulo y mucha fatiga: se usa con moderaci\xF3n, normalmente en la \xFAltima serie de ejercicios de aislamiento.",ej:"Elevaciones laterales: 12 reps con 10 kg \u2192 sin descansar, 10 reps con 7 kg \u2192 8 reps con 5 kg."},{id:"restpause",term:"Rest-pause",def:"Haces la serie hasta cerca del fallo, descansas 10\u201320 segundos y, con el mismo peso, sacas un mini-bloque m\xE1s de repeticiones. Se puede repetir 1\u20132 veces. Permite acumular repeticiones efectivas en poco tiempo.",ej:"12 reps \u2192 15 s de pausa \u2192 4 reps \u2192 15 s \u2192 3 reps, todo con el mismo peso."},{id:"amrap",term:"AMRAP",def:"\xABAs Many Reps As Possible\xBB: haces todas las repeticiones posibles con t\xE9cnica correcta (seg\xFAn el RIR indicado). Sirve para medir progreso y ajustar cargas.",ej:"\xDAltima serie AMRAP @ RIR 1: anota cu\xE1ntas salieron; si superas el rango, la pr\xF3xima semana sube el peso."},{id:"warmup",term:"Serie de aproximaci\xF3n",def:"Series ligeras previas a las series efectivas para preparar articulaciones, activar la musculatura y practicar la t\xE9cnica sin generar fatiga. No cuentan como volumen efectivo.",ej:"Antes de un top set de 100 kg: 8 reps con 40 kg, 5 con 60 kg, 3 con 80 kg."},{id:"efectiva",term:"Serie efectiva",def:"Serie de trabajo real, hecha lo bastante cerca del fallo (RIR 0\u20134) como para estimular hipertrofia. Es la unidad con la que se cuenta el volumen semanal por grupo muscular.",ej:"3 series efectivas de 8\u201310 @ RIR 2 en remo = 3 series que suman al volumen de espalda."},{id:"superset",term:"Superserie",def:"Dos ejercicios realizados uno inmediatamente despu\xE9s del otro, descansando reci\xE9n al terminar el segundo. Ahorra tiempo y funciona mejor con m\xFAsculos antagonistas o que no compiten entre s\xED.",ej:"Curl de b\xEDceps + extensi\xF3n de tr\xEDceps en polea, descanso de 90 s al completar ambos."},{id:"tempo",term:"Tempo",def:"Velocidad de cada fase de la repetici\xF3n escrita en 4 n\xFAmeros: exc\xE9ntrica \u2013 pausa abajo \u2013 conc\xE9ntrica \u2013 pausa arriba (en segundos). Controlar la bajada suele ser lo m\xE1s relevante para hipertrofia.",ej:"Tempo 3-1-1-0: bajas en 3 s, pausa de 1 s, subes en 1 s, sin pausa arriba."},{id:"fallo",term:"Fallo muscular / fallo t\xE9cnico",def:"Fallo muscular: no puedes completar otra repetici\xF3n aunque lo intentes. Fallo t\xE9cnico: a\xFAn podr\xEDas moverla, pero ya no con t\xE9cnica correcta. Para hipertrofia se entrena cerca del fallo; llegar siempre al fallo absoluto aumenta la fatiga m\xE1s que el est\xEDmulo.",ej:"Si en la rep 9 la espalda se despega del respaldo, esa fue tu \xFAltima rep \xFAtil: fallo t\xE9cnico."},{id:"volumen",term:"Volumen de entrenamiento",def:"Cantidad total de trabajo. La forma m\xE1s usada de medirlo es el n\xFAmero de series efectivas por grupo muscular por semana; tambi\xE9n se mide en kilos totales (peso \xD7 reps \xD7 series).",ej:"Espalda: 14 series efectivas/semana. FORJA calcula el tonelaje de cada sesi\xF3n autom\xE1ticamente."},{id:"sobrecarga",term:"Sobrecarga progresiva",def:"Principio central del progreso: hacer m\xE1s con el tiempo \u2014 m\xE1s peso, m\xE1s repeticiones o m\xE1s series con la misma t\xE9cnica. Por eso registrar cada serie importa: sin historial no hay progresi\xF3n medible.",ej:"Semana 1: 80 kg \xD7 8. Semana 3: 80 kg \xD7 10. Semana 4: 82,5 kg \xD7 8."},{id:"mesociclo",term:"Mesociclo",def:"Bloque de entrenamiento de 4 a 8 semanas con una progresi\xF3n planificada (subiendo volumen o intensida y:"El IE mide el esfuerzo de cada serie en escala 1 a 10. 1\u20135: muy f\xE1cil (calentamiento). 6\u20137: medio, terminar\xEDas con 3\u20134 reps en reserva. 8: desafiante, ~2 reps en reserva. 9: muy exigente, queda 1 rep en reserva. 10: fallo total. En FORJA cada serie muestra el RIR equivalente: IE 10 = RIR 0, IE 9 = RIR 1, IE 8 = RIR 2. Respeta el IE de cada ejercicio como par\xE1metro."},{id:Ie(),title:"Series y calentamiento",body:"Las series que aparecen en cada ejercicio son las series efectivas (cerca o hasta el fallo, seg\xFAn el IE). Antes, calienta en el propio ejercicio: empieza con cargas bajas y s\xFAbelas de forma progresiva con pocas repeticiones, sin fatigarte. Ejemplo Leg Press: 40 kg (10) \u2192 100 kg (6) \u2192 140 kg (3) \u2192 serie principal. Regla del \xAB/\xBB: en el nombre = opciones (elige la que prefieras); en las repeticiones = las reps de cada serie (Serie 1 / Serie 2 / Serie 3)."},{id:Ie(),title:"Descanso",body:"Depende del esfuerzo de la serie. Ejercicios libres/compuestos: 2 a 5 minutos. Ejercicios aislados: 1 a 2:30 minutos. Los descansos precargados en cada ejercicio son una referencia (120 s compuestos, 90 s aislados); aj\xFAstalos con el temporizador o desde el modo Coach."},{id:Ie(),title:"Cadencia / velocidad de ejecuci\xF3n",body:"Contrae r\xE1pido en la fase conc\xE9ntrica (~1\u20131,5 s) y alarga de forma controlada la exc\xE9ntrica (2\u20133 s). La t\xE9cnica y la amplitud no son negociables: no uses cargas que no te permitan mantenerlas. Las repeticiones \xABrobadas\xBB rara vez son efectivas."},{id:Ie(),title:"T\xE9cnicas avanzadas",body:"Rest-Pause: al finalizar la \xFAltima serie, descansa 15 s, ve al fallo, descansa otros 15 s y vuelve al fallo, sin cambiar la carga. Drop-Set: ejecuta la serie de la planilla; al terminar, baja la carga ~20 % (1\u20132 placas en m\xE1quinas) y haz otra serie de inmediato, sin descanso; repite el proceso una vez m\xE1s."},{id:Ie(),title:"Abdomen y pantorrillas",body:"Pantorrillas: gemelos de pie o en prensa/hack (rodilla extendida), 4 series en pir\xE1mide (15\u201320 / 12\u201315 / 8\u201310 / 12\u201315) al fallo, amplitud completa y control, 2\u20133 veces por semana. Abdomen: plancha frontal 2\xD760 s (10 s de descanso entre ellas); abdomen inferior 3 series al fallo, 3 veces por semana. Vac\xEDo abdominal 10 min en ayunas, todos los d\xEDas."},{id:Ie(),title:"Movilidad, estiramientos y bracing",body:"Mant\xE9n la movilidad al d\xEDa, siempre antes de entrenar o en un horario aparte. Bracing: inhala por la boca dirigiendo el aire al abdomen inferior y oblicuos, cerrando costillas y fijando el abdomen para proteger la columna en ejercicios libres. Isquiotibiales din\xE1mico 2\xD710 por pierna. Aductores 2\xD740 s. Pantorrilla en step 40 s + 20 s por pierna. Pectoral 2\xD740 s por lado. Gl\xFAteos 2\xD740 s por lado. Flexores de cadera 2\xD730 s por lado. Flexores de cadera / recto femoral 2\xD730 s por lado."}],schedule:null,events:[],updatedAt:Pt()}}function Gz(){let e=YK(),[t,a,r,n,o]=e.days.map(i=>i.id);return e.schedule={mon:t,tue:a,wed:r,thu:null,fri:n,sat:o,sun:null},e}var ty=()=>({byEx:{},sessions:[],bodyweight:[],bodyPhotos:[]}),rI=()=>c.default.createElement("style",null,`
